services:
  mailtag-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
      - ./data:/app/data
      - ./config.toml:/app/config.toml:ro
    env_file: .env
    environment:
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
      - MLX_ENABLED=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
