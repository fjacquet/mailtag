# Main configuration for the MailTag application.

[general]
# The name of the Ollama model to use for classification.
ollama_model = "ollama_chat/gemma3"

# The base URL for the Ollama API.
api_base = "${OLLAMA_API_URL}"

[classifier]
# The confidence threshold required for the AI model's suggestion to be accepted.
ai_confidence_threshold = 0.98
# The confidence threshold required for a historical sender-based classification to be used.
historical_confidence_threshold = 0.9
# The minimum number of times a sender must be classified before pre-classification is used.
min_count = 10


[logging]
# The logging level. Can be DEBUG, INFO, WARNING, ERROR, CRITICAL.
level = "INFO"

# The file to write logs to.
file = "logs/mailtag.log"

[imap]
host = "mail.infomaniak.com"
user = "${IMAP_USER}"
password = "${IMAP_PASSWORD}"

[gmail]
credentials_file = "credentials.json"
token_file = "token.json"

[fast_parse]
# The number of emails to fetch in the first pass.
batch_size = 500
# The time-to-live for the folder hierarchy cache in hours.
folder_cache_ttl_hours = 24
# The designated folder for emails the AI cannot confidently classify.
unclassified_folder_name = "Unclassified"
