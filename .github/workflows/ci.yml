---
name: CI Tests and Checks
on:
  push:
    branches: [main, maincd]
  pull_request:
    branches: [main, maincd]
  workflow_dispatch:
permissions:
  contents: read
  actions: write
jobs:
  test:
    name: Run Tests
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create env file
        run: |
          touch .env
          echo BASE_URL=${{ secrets.BASE_URL }} >> .env
          echo RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }} >> .env
          echo OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} >> .env
          echo OPENAI_MODEL_NAME=${{ secrets.OPENAI_MODEL_NAME }} >> .env
          echo MAIL=${{ secrets.MAIL }} >> .env
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install the latest version of uv and activate the environment
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true
          enable-cache: true
          prune-cache: false
      - name: Install project dependencies with uv
        run: |
          uv sync -U
      - name: Run tests with coverage
        run: |
          uv run pytest --cov --cov-branch --cov-report=xml
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: fjacquet/mailtag
          fail_ci_if_error: false
      - name: Run ruff linter
        run: |
          uv run ruff check .
      - name: Run ruff formatter check
        run: |-
          uv run ruff format --check .
