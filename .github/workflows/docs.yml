name: Docs
on:
  push:
    branches: [main]
    paths: ["docs/**", "docs-site/**", "mkdocs.yml", ".github/workflows/docs.yml"]
  pull_request:
    branches: [main]
    paths: ["docs/**", "docs-site/**", "mkdocs.yml"]
  workflow_dispatch:
permissions: { contents: read, pages: write, id-token: write }
jobs:
  docs:
    uses: fjacquet/ci/.github/workflows/docs-publish.yml@v1
    with: { python-version: "3.13" }
